name: Arthavidhi News Bot

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run one poll cycle
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          DEDUP_DB_PATH: ./data/seen_announcements.db
          LIB_DOWNLOAD_FOLDER: ./data/cache
          LOG_LEVEL: INFO
        run: python run_once.py

      - name: Save updated dedup state back to the repo
        run: |
          git config user.name "arthavidhi-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen_announcements.db
          git diff --cached --quiet || git commit -m "chore: update seen-announcements state"
          git push
